spring.application.name=gateway-service

server.port=8080

management.endpoints.web.exposure.include=*

##################################################
# AUTH SERVICE
##################################################

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

##################################################
# ORCHESTRATOR SERVICE
##################################################

spring.cloud.gateway.server.webflux.routes[1].id=orchestrator-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/workflows/**

spring.cloud.gateway.server.webflux.routes[2].id=ai-workflow
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/ai/**

##################################################
# PLANNING SERVICE
##################################################

spring.cloud.gateway.server.webflux.routes[3].id=planning-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/plans/**